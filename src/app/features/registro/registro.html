<div class="login-container">

  <div class="login-left">
    <div class="login-left-content">
      <div class="login-brand">
        <span class="logo-letters">VS</span>
        <span class="login-brand-name">NutriPro</span>
      </div>
      <p class="login-tagline">Tu rendimiento<br><span>empieza hoy</span></p>
      <p class="login-tagline-sub">Pedro Luis Castillo · Nutricionista Deportivo</p>
    </div>
  </div>

  <div class="login-right">
    <div class="login-card">
      <h2>Crear cuenta</h2>
      <p class="subtitle">Regístrate y agenda tu primera cita</p>

      <div *ngIf="errorMensaje" class="error-alert">
        {{ errorMensaje }}
      </div>

      <form (ngSubmit)="registrar()">
        <div class="form-row">
          <div class="form-group">
            <label>Nombre <span class="required">*</span></label>
            <input type="text" name="nombre"
              [(ngModel)]="datos.nombre"
              [class.input-error]="errores.nombre"
              placeholder="Tu nombre"/>
            <span class="field-error" *ngIf="errores.nombre">{{ errores.nombre }}</span>
          </div>
          <div class="form-group">
            <label>Apellido</label>
            <input type="text" name="apellido"
              [(ngModel)]="datos.apellido"
              placeholder="Tu apellido"/>
          </div>
        </div>

        <div class="form-group">
          <label>Correo electrónico <span class="required">*</span></label>
          <input type="email" name="email"
            [(ngModel)]="datos.email"
            [class.input-error]="errores.email"
            placeholder="ejemplo@correo.com"/>
          <span class="field-error" *ngIf="errores.email">{{ errores.email }}</span>
        </div>

        <div class="form-group">
          <label>Contraseña <span class="required">*</span></label>
          <div class="password-wrapper">
  <input
    [type]="mostrarPassword ? 'text' : 'password'"
    name="password"
    [(ngModel)]="datos.password"
    [class.input-error]="errores.password"
    placeholder="Mínimo 6 caracteres"/>
  <button type="button" class="toggle-password" (click)="togglePassword()" [title]="mostrarPassword ? 'Ocultar contraseña' : 'Ver contraseña'">
    <svg *ngIf="mostrarPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
      <circle cx="12" cy="12" r="3"/>
      <line x1="1" y1="1" x2="23" y2="23"/>
    </svg>
    <svg *ngIf="!mostrarPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>
  </button>
</div>
          <span class="field-error" *ngIf="errores.password">{{ errores.password }}</span>
        </div>

        <div class="form-group">
          <label>Confirmar contraseña <span class="required">*</span></label>
          <div class="password-wrapper">
  <input
    [type]="mostrarConfirmarPassword ? 'text' : 'password'"
    name="confirmarPassword"
    [(ngModel)]="datos.confirmarPassword"
    [class.input-error]="errores.confirmarPassword"
    placeholder="Repite tu contraseña"/>
  <button type="button" class="toggle-password" (click)="toggleConfirmarPassword()" [title]="mostrarConfirmarPassword ? 'Ocultar contraseña' : 'Ver contraseña'">
    <svg *ngIf="mostrarConfirmarPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
      <circle cx="12" cy="12" r="3"/>
      <line x1="1" y1="1" x2="23" y2="23"/>
    </svg>
    <svg *ngIf="!mostrarConfirmarPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>
  </button>
</div>
          <span class="field-error" *ngIf="errores.confirmarPassword">{{ errores.confirmarPassword }}</span>
        </div>

        <button type="submit" class="login-btn" [disabled]="cargando">
          {{ cargando ? 'Creando cuenta...' : 'Crear cuenta' }}
        </button>
      </form>

      <p class="login-footer">
        ¿Ya tienes cuenta? <a routerLink="/login">Iniciar sesión</a>
      </p>
    </div>
  </div>

</div>
