<div class="container">
  <div class="card">
    <h3>Nueva Contraseña</h3>
    <p class="text-muted">Ingresa las nuevas credenciales para recuperar el acceso a tu cuenta.</p>

    <div *ngIf="mensajeExito" class="alert alert-success">{{ mensajeExito }}</div>
    <div *ngIf="mensajeError" class="alert alert-danger">{{ mensajeError }}</div>

    <form *ngIf="token && !mensajeExito" (ngSubmit)="onSubmit()">
      <div class="mb-4">
        <label class="form-label">Nueva Contraseña</label>
        <input
          type="password"
          [(ngModel)]="nuevaPassword"
          name="nuevaPassword"
          class="form-control"
          required
          placeholder="Mínimo 6 caracteres">
      </div>
      <div class="mb-4">
        <label class="form-label">Confirmar Contraseña</label>
        <input
          type="password"
          [(ngModel)]="confirmarPassword"
          name="confirmarPassword"
          class="form-control"
          required
          placeholder="Repite la contraseña">
      </div>
      <button type="submit" class="btn btn-primary">Actualizar Contraseña</button>
    </form>
  </div>
</div>
