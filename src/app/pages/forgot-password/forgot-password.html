<div class="container">
  <div class="card">
    <h3>Recuperar Acceso</h3>
    <p class="text-muted">Ingresa tu correo electrónico registrado y te enviaremos un enlace seguro para restablecer tu contraseña.</p>

    <div *ngIf="mensajeExito" class="alert alert-success">{{ mensajeExito }}</div>
    <div *ngIf="mensajeError" class="alert alert-danger">{{ mensajeError }}</div>

    <form *ngIf="!mensajeExito" (ngSubmit)="onSubmit()">
      <div class="mb-4">
        <label class="form-label">Correo Electrónico</label>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          class="form-control"
          required
          placeholder="ejemplo@correo.com">
      </div>
      <button type="submit" class="btn btn-primary" [disabled]="cargando">
        {{ cargando ? 'Enviando...' : 'Enviar Enlace de Recuperación' }}
      </button>
    </form>

    <div class="text-center mt-4">
      <a routerLink="/login">← Volver al Login</a>
    </div>
  </div>
</div>
